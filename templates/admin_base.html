<!DOCTYPE html>
<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport"/>
  <meta content="Untree.co" name="author"/>
  <link href="{{ url_for('static', filename='favicon.png') }}" rel="shortcut icon"/>
  <meta content="" name="description">
   <meta content="bootstrap, bootstrap4" name="keywords">
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Source+Serif+Pro:wght@400;700&amp;display=swap" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/owl.carousel.min.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/owl.theme.default.min.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/jquery.fancybox.min.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='fonts/icomoon/style.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='fonts/flaticon/font/flaticon.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/daterangepicker.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/aos.css') }}" rel="stylesheet"/>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <title>{% block title %}KopiGo{% endblock %}</title>
   </meta>
  </meta>
 </head>
 <body>
    <!-- Mobile Nav -->
  <div class="site-mobile-menu site-navbar-target">
   <div class="site-mobile-menu-header">
    <div class="site-mobile-menu-close">
     <span class="icofont-close js-menu-toggle"></span>
    </div>
   </div>
   <div class="site-mobile-menu-body"></div>
  </div>

  <!-- Navigation -->
  <nav class="site-nav">
   <div class="container">
    <div class="site-navigation">
     <a class="logo m-0" href="{{ url_for('admin_dashboard') }}">
      KopiGo<span class="text-primary">.</span>
     </a>
     <ul class="js-clone-nav d-none d-lg-inline-block text-left site-menu float-right">
        <li><a href="{{ url_for('create_attraction') }}">Create Attraction</a></li>
        <li><a href="{{ url_for('count_region') }}">Region Breakdown</a></li>
        <li><a href="{{ url_for('count_eateries_hawkers') }}">Eateries &amp; Hawkers Count</a></li>
        <li><a href="{{ url_for('admin_analysis') }}">Analytics</a></li>
        <li><a href="{{ url_for('logout') }}">Logout</a></li>
     </ul>
     <a class="burger ml-auto float-right site-menu-toggle js-menu-toggle d-inline-block d-lg-none light" data-target="#main-navbar" data-toggle="collapse" href="#"><span></span></a>
    </div>
   </div>
  </nav>

  {% block hero %}{% endblock %}

  <div class="main-content">
    {% block content %}{% endblock %}
  </div>

  <footer class="footer">
    <small>&copy; 2025 KopiGo. All rights reserved.</small>
  </footer>

  <!-- Scripts -->
  <script src="{{ url_for('static', filename='js/jquery-3.4.1.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/popper.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/owl.carousel.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/jquery.animateNumber.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/jquery.waypoints.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/jquery.fancybox.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/aos.js') }}"></script>
  <script src="{{ url_for('static', filename='js/moment.min.js') }}"></script>
  <script src="{{ url_for('static', filename='js/daterangepicker.js') }}"></script>
  <script src="{{ url_for('static', filename='js/typed.js') }}"></script>
  <script src="{{ url_for('static', filename='js/custom.js') }}"></script>
 </body>
</html>
