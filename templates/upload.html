{% extends "base.html" %}

{% block title %}Share Your Experience{% endblock %}

{% block content %}
<div class="hero hero-inner" style="height: 100px;"></div>

<div class="untree_co-section">
  <div class="container">
    <div class="row justify-content-center text-center mb-5">
      <div class="col-lg-6">
        <h2 class="section-title mb-3">Share Your Experience</h2>
        <p>Upload your review, rate your experience, and share a photo with us!</p>
      </div>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">
        <form method="post" action="{{ url_for('upload_image') }}" enctype="multipart/form-data">
          <div class="form-group mb-3">
            <label for="rating">Rating (1 to 5 stars)</label>
            <select class="form-control" id="rating" name="rating" required>
              <option value="">Choose...</option>
              <option value="1">★☆☆☆☆ (1)</option>
              <option value="2">★★☆☆☆ (2)</option>
              <option value="3">★★★☆☆ (3)</option>
              <option value="4">★★★★☆ (4)</option>
              <option value="5">★★★★★ (5)</option>
            </select>
          </div>

          <div class="form-group mb-3">
            <label for="image">Upload an image</label>
            <input type="file" class="form-control-file" id="image" name="image" accept="image/*">
          </div>

          <div class="form-group mb-4">
            <label for="review">Your Review</label>
            <textarea class="form-control" id="review" name="review" rows="5" placeholder="Write your review here..." required></textarea>
          </div>

          <div class="text-center">
            <button type="submit" class="btn btn-primary" value="Upload">Submit Review</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
